<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vue3 for html</title>
    <!-- Connecting vue to html -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <div id="app">
        <button @click="count++">
            Count is: {{ count }}
        </button>
    </div>

    <script>
        const { createApp, ref } = Vue; // Initializing script

        createApp({
            setup() {
                return {
                    count: ref(0)
                }
            }
        }).mount('#app')
    </script>
</body>
